<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapMeal</title>
    <style>
      #loader-inicial {
        position: fixed;
        inset: 0;
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Segoe UI', sans-serif;
        gap: 16px;
      }
      #loader-inicial .logo-text {
        font-size: 1.6rem;
        font-weight: 800;
        color: #0c0c2c;
      }
      #loader-inicial .logo-text span {
        color: #ff6a00;
      }
      #loader-inicial .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #ff6a00;
        border-radius: 50%;
        animation: girar 0.8s linear infinite;
      }
      #loader-inicial p {
        color: #6b7280;
        font-size: 0.9rem;
        margin: 0;
      }
      @keyframes girar {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- ✅ Loader visible INMEDIATO antes de que React cargue -->
    <div id="loader-inicial">
      <div class="logo-text">Tap<span>Meal</span></div>
      <div class="spinner"></div>
      <p>Cargando...</p>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- ✅ Ocultar loader en cuanto React tome el control -->
    <script>
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('loader-inicial');
          if (loader) loader.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
